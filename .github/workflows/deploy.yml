# deploy.yml
name: flask-docker-app-deploy

on:
  push:
    branches:
      - main   # Déclenche le déploiement à chaque push sur la branche main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code depuis GitHub
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Configurer Docker
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: fatouadamabah
          password: ${{ secrets.DOCKER_HUB_PASSWORD }} # tu dois créer ce secret dans GitHub

      # 3️⃣ Construire l'image Docker
      - name: Build Docker image
        run: docker build -t fatouadamabah/python-app:latest .

      # 4️⃣ Pousser l'image sur Docker Hub
      - name: Push Docker image
        run: docker push fatouadamabah/python-app:latest

      # 5️⃣ (Optionnel) Lancer le conteneur sur le serveur distant
      # Tu peux ajouter ici un déploiement sur un serveur via SSH ou un cloud provider